<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
  :root{
    --emerald:#0B6B53;
    --emerald-2:#0d7d61;
    --emerald-deep:#073a2d;
    --gold:#C9A227;
    --gold-2:#e0b83a;
    --navy:#0B1F3A;
    --ink:#12211c;
    --panel:#f4f1e9;
    --line:rgba(255,255,255,.10);
    --sb-w:266px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:var(--font);background:#e9e4d7;color:var(--ink);overflow:hidden;}

  .app-shell{display:flex;min-height:100vh;height:100vh;}

  /* ---------------- Sidebar ---------------- */
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;width:var(--sb-w);z-index:60;
    background:linear-gradient(180deg,var(--emerald-deep),var(--emerald) 60%,var(--emerald-deep));
    color:#f3efe2;display:flex;flex-direction:column;
    transform:translateX(0);transition:transform .28s ease;
    box-shadow:2px 0 18px rgba(0,0,0,.18);
  }
  .app-shell.collapsed .sidebar{transform:translateX(-100%);}

  .brand{display:flex;align-items:center;gap:12px;padding:22px 18px 18px;
    border-bottom:1px solid var(--line);}
  .brand .logo{width:44px;height:44px;border-radius:12px;flex:0 0 44px;
    background:linear-gradient(135deg,var(--gold),var(--gold-2));
    display:flex;align-items:center;justify-content:center;color:var(--emerald-deep);
    font-weight:900;font-size:20px;box-shadow:0 3px 10px rgba(0,0,0,.25);}
  .brand .bt{line-height:1.15;}
  .brand .bt .t1{font-weight:800;font-size:15px;letter-spacing:.3px;color:#fff;}
  .brand .bt .t2{font-size:9.5px;letter-spacing:1.6px;text-transform:uppercase;
    color:var(--gold-2);margin-top:3px;}

  nav.nav{flex:1;overflow-y:auto;padding:14px 12px;}
  .group-toggle{
    width:100%;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);
    border:1px solid var(--line);color:#fff;padding:12px 14px;border-radius:11px;
    cursor:pointer;font-size:13.5px;font-weight:800;letter-spacing:.3px;
  }
  .group-toggle .ico{width:26px;height:26px;border-radius:8px;flex:0 0 26px;
    background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:14px;}
  .group-toggle .chev{margin-left:auto;transition:transform .22s;font-size:12px;color:var(--gold-2);}
  .app-shell:not(.group-open) .group-toggle .chev{transform:rotate(-90deg);}

  .group-body{overflow:hidden;max-height:600px;transition:max-height .28s ease;margin-top:8px;}
  .app-shell:not(.group-open) .group-body{max-height:0;}

  .menu-item{
    width:100%;display:flex;align-items:center;gap:11px;background:transparent;
    border:1px solid transparent;color:#e7f0ec;text-align:left;cursor:pointer;
    padding:11px 12px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:5px;
    transition:background .15s,border-color .15s;
  }
  .menu-item .dot{width:8px;height:8px;border-radius:50%;flex:0 0 8px;
    background:rgba(255,255,255,.35);}
  .menu-item small{display:block;font-weight:400;font-size:10px;color:#bcd3c9;margin-top:2px;}
  .menu-item:hover{background:rgba(255,255,255,.08);}
  .menu-item.active{
    background:linear-gradient(90deg,rgba(201,162,39,.22),rgba(201,162,39,.06));
    border-color:rgba(201,162,39,.55);
  }
  .menu-item.active .dot{background:var(--gold-2);box-shadow:0 0 0 3px rgba(201,162,39,.22);}

  .sb-foot{padding:14px 16px 18px;border-top:1px solid var(--line);font-size:10.5px;
    color:#bcd3c9;line-height:1.6;}
  .sb-foot b{color:var(--gold-2);}

  /* ---------------- Content ---------------- */
  .content{flex:1;margin-left:var(--sb-w);display:flex;flex-direction:column;
    min-width:0;height:100vh;transition:margin-left .28s ease;}
  .app-shell.collapsed .content{margin-left:0;}

  .topbar{
    display:flex;align-items:center;gap:12px;padding:12px 18px;
    background:var(--navy);color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.16);
    z-index:20;flex:0 0 auto;
  }
  .hamb{width:42px;height:42px;flex:0 0 42px;border:none;border-radius:11px;cursor:pointer;
    background:rgba(255,255,255,.10);color:#fff;font-size:19px;display:flex;
    align-items:center;justify-content:center;transition:background .15s;}
  .hamb:hover{background:rgba(255,255,255,.20);}
  .topbar .title{font-weight:800;font-size:15px;letter-spacing:.2px;min-width:0;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .topbar .title small{display:block;font-weight:400;font-size:11px;color:#b7c4d6;
    margin-top:1px;overflow:hidden;text-overflow:ellipsis;}
  .topbar .actions{margin-left:auto;display:flex;gap:8px;flex:0 0 auto;}
  .tbtn{border:none;border-radius:10px;padding:10px 15px;font-size:13px;font-weight:800;
    cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:transform .1s,filter .15s;
    white-space:nowrap;}
  .tbtn:active{transform:translateY(1px);}
  .tbtn.gold{background:linear-gradient(90deg,var(--gold),var(--gold-2));color:#241c00;
    box-shadow:0 3px 10px rgba(201,162,39,.35);}
  .tbtn.ghost{background:rgba(255,255,255,.10);color:#fff;}
  .tbtn.ghost:hover{background:rgba(255,255,255,.20);}
  .tbtn .lbl-long{display:inline;}
  .tbtn .lbl-short{display:none;}

  .frame-area{position:relative;flex:1;min-height:0;background:#e9e4d7;}
  .frame-area iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#efe9dc;}
  .frame-area iframe.hidden{visibility:hidden;pointer-events:none;}

  /* scrim (mobile overlay) */
  .scrim{display:none;position:fixed;inset:0;background:rgba(6,20,15,.5);z-index:55;}

  /* ---------------- Mobile ---------------- */
  @media (max-width: 820px){
    .content{margin-left:0;}
    .app-shell.collapsed .content{margin-left:0;}
    .app-shell:not(.collapsed) .scrim{display:block;}
    .topbar{padding:10px 12px;gap:9px;}
    .topbar .title{font-size:14px;}
    .topbar .title small{display:none;}
    .tbtn{padding:10px 12px;}
    .tbtn .lbl-long{display:none;}
    .tbtn .lbl-short{display:inline;}
  }
</style>
</head>
<body>

<div class="app-shell collapsed group-open" id="shell">

  <div class="scrim" id="scrim"></div>

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">F</div>
      <div class="bt">
        <div class="t1">FANDIEGO TRAVEL</div>
        <div class="t2">Generator Surat</div>
      </div>
    </div>

    <nav class="nav">
      <button class="group-toggle" id="groupToggle" type="button" aria-expanded="true">
        <span class="ico">📄</span>
        <span>Surat Anda</span>
        <span class="chev">▾</span>
      </button>

      <div class="group-body" id="groupBody">
        <button class="menu-item" data-doc="rekomendasi" type="button">
          <span class="dot"></span>
          <span>Surat Rekomendasi Paspor<small>Rekomendasi pembuatan paspor</small></span>
        </button>
        <button class="menu-item" data-doc="penambahan" type="button">
          <span class="dot"></span>
          <span>Surat Penambahan Nama Paspor<small>Penambahan nama di paspor</small></span>
        </button>
        <button class="menu-item" data-doc="vaksin" type="button">
          <span class="dot"></span>
          <span>Surat Rekomendasi Vaksin<small>Rekomendasi suntik vaksin meningitis/polio</small></span>
        </button>
        <button class="menu-item" data-doc="izinsekolah" type="button">
          <span class="dot"></span>
          <span>Surat Izin Sekolah<small>Permohonan izin sekolah/kampus</small></span>
        </button>
        <button class="menu-item" data-doc="cuti" type="button">
          <span class="dot"></span>
          <span>Surat Cuti Umroh<small>Izin cuti keberangkatan</small></span>
        </button>
        <button class="menu-item" data-doc="keterangan" type="button">
          <span class="dot"></span>
          <span>Surat Keterangan Umroh<small>Keterangan keberangkatan</small></span>
        </button>
      </div>
    </nav>

    <div class="sb-foot">
      <b>PT. Wisata Hati Universal</b><br>
      Nomor surat otomatis &amp; anti-duplikat.<br>
      Tersimpan offline di browser ini.
    </div>
  </aside>

  <!-- ============ CONTENT ============ -->
  <div class="content">
    <header class="topbar">
      <button class="hamb" id="hamb" type="button" aria-label="Menu">☰</button>
      <div class="title">
        <span id="docTitle">Surat Rekomendasi Pembuatan Paspor</span>
        <small id="docSub">Isi formulir — pratinjau surat diperbarui otomatis</small>
      </div>
      <div class="actions">
        <button class="tbtn ghost" id="btnSample" type="button" style="display:none;">
          <span class="lbl-long">Isi Contoh</span><span class="lbl-short">Contoh</span>
        </button>
        <button class="tbtn gold" id="btnPrint" type="button">
          🖨️ <span class="lbl-long">Cetak PDF</span><span class="lbl-short">PDF</span>
        </button>
      </div>
    </header>

    <div class="frame-area">
      <iframe id="frameUmroh" class="hidden" title="Surat Umroh"></iframe>
      <iframe id="framePaspor" class="hidden" title="Surat Paspor"></iframe>
    </div>
  </div>
</div>

  var frameUmroh  = document.getElementById('frameUmroh');
  var framePaspor = document.getElementById('framePaspor');

  var loaded = { umroh:false, paspor:false };
  var pending = { umroh:null, paspor:null };

  function frameOf(app){ return app==='umroh' ? frameUmroh : framePaspor; }

  function send(app, msg){
    if(loaded[app]){
      try{ frameOf(app).contentWindow.postMessage(msg, '*'); }catch(_){}
    } else {
      pending[app] = msg; // deliver on load
    }
  }
  frameUmroh.addEventListener('load', function(){
    loaded.umroh = true;
    if(pending.umroh){ try{ frameUmroh.contentWindow.postMessage(pending.umroh,'*'); }catch(_){} pending.umroh=null; }
  });
  framePaspor.addEventListener('load', function(){
    loaded.paspor = true;
    if(pending.paspor){ try{ framePaspor.contentWindow.postMessage(pending.paspor,'*'); }catch(_){} pending.paspor=null; }
  });

  // start loading both apps (isolated in their own documents)
  frameUmroh.srcdoc  = HTML_UMROH;
  framePaspor.srcdoc = HTML_PASPOR;

  // ---- letter definitions ----
  var DOCS = {
    rekomendasi:{ app:'paspor', title:'Surat Rekomendasi Pembuatan Paspor',
      sub:'Isi data jemaah — pratinjau surat diperbarui otomatis',
      msg:{kind:'fandiego', action:'setLayanan', value:'pembuatan'} },
    penambahan:{ app:'paspor', title:'Surat Penambahan Nama Paspor',
      sub:'Isi data jemaah — pratinjau surat diperbarui otomatis',
      msg:{kind:'fandiego', action:'setLayanan', value:'penambahan_nama'} },
    vaksin:{ app:'umroh', title:'Surat Rekomendasi Vaksin',
      sub:'Rekomendasi suntik vaksin Meningitis/Polio untuk keberangkatan umroh',
      msg:{kind:'fandiego', action:'setPage', page:'vaksin'} },
    izinsekolah:{ app:'umroh', title:'Surat Izin Sekolah',
      sub:'Permohonan izin sekolah/kampus untuk jemaah yang akan berangkat umroh',
      msg:{kind:'fandiego', action:'setPage', page:'izinsekolah'} },
    cuti:{ app:'umroh', title:'Surat Izin Cuti Umroh',
      sub:'Permohonan izin cuti keberangkatan jemaah',
      msg:{kind:'fandiego', action:'setPage', page:'cuti'} },
    keterangan:{ app:'umroh', title:'Surat Keterangan Umroh',
      sub:'Keterangan keberangkatan jemaah',
      msg:{kind:'fandiego', action:'setPage', page:'keterangan'} }
  };

  var activeApp = 'paspor';
  var shell    = document.getElementById('shell');
  var docTitle = document.getElementById('docTitle');
  var docSub   = document.getElementById('docSub');
  var btnSample= document.getElementById('btnSample');
  var items    = Array.prototype.slice.call(document.querySelectorAll('.menu-item'));

  function isMobile(){ return window.matchMedia('(max-width: 820px)').matches; }

  function selectDoc(key){
    var d = DOCS[key];
    if(!d) return;
    activeApp = d.app;

    // show the right frame
    frameUmroh.classList.toggle('hidden', d.app!=='umroh');
    framePaspor.classList.toggle('hidden', d.app!=='paspor');

    // titles
    docTitle.textContent = d.title;
    docSub.textContent   = d.sub;

    // sample button only for umroh letters
    btnSample.style.display = (d.app==='umroh') ? '' : 'none';

    // tell the app which page/mode to show
    send(d.app, d.msg);

    // active state
    items.forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-doc')===key); });

    // close sidebar on mobile after choosing
    if(isMobile()) shell.classList.add('collapsed');
  }

  items.forEach(function(b){
    b.addEventListener('click', function(){ selectDoc(b.getAttribute('data-doc')); });
  });

  // ---- sidebar open/close ----
  function toggleNav(){ shell.classList.toggle('collapsed'); }
  document.getElementById('hamb').addEventListener('click', toggleNav);
  document.getElementById('scrim').addEventListener('click', function(){ shell.classList.add('collapsed'); });

  // ---- "Surat Anda" group expand/collapse ----
  document.getElementById('groupToggle').addEventListener('click', function(){
    shell.classList.toggle('group-open');
    this.setAttribute('aria-expanded', shell.classList.contains('group-open') ? 'true' : 'false');
  });

  // ---- unified top-bar actions (delegated to active app) ----
  document.getElementById('btnPrint').addEventListener('click', function(){
    send(activeApp, {kind:'fandiego', action:'print'});
  });
  document.getElementById('btnSample').addEventListener('click', function(){
    send('umroh', {kind:'fandiego', action:'sample'});
  });

  // ---- initial layout: sidebar open on desktop, closed on mobile ----
  if(!isMobile()) shell.classList.remove('collapsed');

  // default letter
  selectDoc('rekomendasi');
})();
</script>
